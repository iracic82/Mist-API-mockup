<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mist Mock API - Data Viewer</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --green: #4ade80;
    --red: #f87171;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Cascadia Code', monospace; background: var(--bg); color: var(--text); font-size: 13px; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .header .config { display: flex; gap: 8px; align-items: center; flex: 1; }
  .header input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .header input#apiUrl { width: 360px; }
  .header input#apiKey { width: 200px; }
  .header button { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; }
  .header button:hover { opacity: 0.85; }
  .header button:disabled { opacity: 0.4; cursor: not-allowed; }

  .status { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .status.ok { background: #064e3b; color: var(--green); }
  .status.err { background: #450a0a; color: var(--red); }
  .status.loading { background: #1e1b4b; color: var(--accent); }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
  .tab { padding: 10px 18px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; font-size: 12px; font-weight: 500; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .count { background: var(--border); color: var(--text-dim); padding: 1px 6px; border-radius: 8px; font-size: 10px; margin-left: 6px; }
  .tab.active .count { background: rgba(108,140,255,0.2); color: var(--accent); }

  .toolbar { padding: 12px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar input[type="text"] { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 260px; }
  .toolbar select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .toolbar .stats { color: var(--text-dim); font-size: 11px; margin-left: auto; }

  .content { padding: 0 24px 24px; overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th { text-align: left; padding: 8px 10px; background: var(--surface); border-bottom: 1px solid var(--border); color: var(--text-dim); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; cursor: pointer; white-space: nowrap; }
  th:hover { color: var(--text); }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 12px; }
  tr:hover td { background: rgba(108,140,255,0.04); }

  .mac { font-family: 'SF Mono', 'Cascadia Code', monospace; color: var(--accent); font-size: 11px; }
  .ip { font-family: 'SF Mono', 'Cascadia Code', monospace; color: var(--text-dim); font-size: 11px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .tag-ap { background: #1e3a5f; color: #60a5fa; }
  .tag-switch { background: #1a3c2a; color: #4ade80; }
  .tag-gateway { background: #3b2a1a; color: #fb923c; }
  .tag-ok { background: #064e3b; color: var(--green); }
  .tag-warn { background: #451a03; color: var(--orange); }
  .tag-err { background: #450a0a; color: var(--red); }
  .dim { color: var(--text-dim); }

  .coherence-ok { color: var(--green); }
  .coherence-bad { color: var(--red); font-weight: 600; }

  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; padding: 16px 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  .card .label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card .value { font-size: 24px; font-weight: 600; margin-top: 4px; }
  .card .sub { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

  .panel { display: none; }
  .panel.active { display: block; }
  .empty { text-align: center; padding: 40px; color: var(--text-dim); }
  label.filter-label { color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>Mist Mock API Data Viewer</h1>
  <div class="config">
    <input id="apiUrl" value="__API_URL__" placeholder="API Base URL">
    <input id="apiKey" type="password" value="__API_KEY__" placeholder="API Key">
    <button id="loadBtn" onclick="loadAll()">Load Data</button>
    <span id="statusBadge" class="status"></span>
  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-panel="overview">Overview</div>
  <div class="tab" data-panel="devices">Devices <span class="count" id="count-devices">0</span></div>
  <div class="tab" data-panel="wireless">Wireless Clients <span class="count" id="count-wireless">0</span></div>
  <div class="tab" data-panel="wired">Wired Clients <span class="count" id="count-wired">0</span></div>
  <div class="tab" data-panel="sites">Sites <span class="count" id="count-sites">0</span></div>
  <div class="tab" data-panel="networks">Networks <span class="count" id="count-networks">0</span></div>
</div>

<!-- Overview -->
<div class="panel active" id="panel-overview">
  <div class="summary-cards" id="summaryCards"></div>
  <div class="content" id="validationResults"></div>
</div>

<!-- Devices -->
<div class="panel" id="panel-devices">
  <div class="toolbar">
    <input type="text" id="searchDevices" placeholder="Search devices..." oninput="filterTable('devices')">
    <select id="filterDeviceType" onchange="filterTable('devices')">
      <option value="">All Types</option><option value="ap">AP</option><option value="switch">Switch</option><option value="gateway">Gateway</option>
    </select>
    <select id="filterDeviceSite" onchange="filterTable('devices')"><option value="">All Sites</option></select>
    <div class="stats" id="stats-devices"></div>
  </div>
  <div class="content"><table id="table-devices"><thead><tr></tr></thead><tbody></tbody></table></div>
</div>

<!-- Wireless -->
<div class="panel" id="panel-wireless">
  <div class="toolbar">
    <input type="text" id="searchWireless" placeholder="Search wireless clients..." oninput="filterTable('wireless')">
    <select id="filterWirelessVendor" onchange="filterTable('wireless')"><option value="">All Vendors</option></select>
    <select id="filterWirelessSite" onchange="filterTable('wireless')"><option value="">All Sites</option></select>
    <label class="filter-label"><input type="checkbox" id="showOnlyBad" onchange="filterTable('wireless')"> Show mismatches only</label>
    <div class="stats" id="stats-wireless"></div>
  </div>
  <div class="content"><table id="table-wireless"><thead><tr></tr></thead><tbody></tbody></table></div>
</div>

<!-- Wired -->
<div class="panel" id="panel-wired">
  <div class="toolbar">
    <input type="text" id="searchWired" placeholder="Search wired clients..." oninput="filterTable('wired')">
    <select id="filterWiredVendor" onchange="filterTable('wired')"><option value="">All Vendors</option></select>
    <select id="filterWiredSite" onchange="filterTable('wired')"><option value="">All Sites</option></select>
    <div class="stats" id="stats-wired"></div>
  </div>
  <div class="content"><table id="table-wired"><thead><tr></tr></thead><tbody></tbody></table></div>
</div>

<!-- Sites -->
<div class="panel" id="panel-sites">
  <div class="toolbar">
    <input type="text" id="searchSites" placeholder="Search sites..." oninput="filterTable('sites')">
    <div class="stats" id="stats-sites"></div>
  </div>
  <div class="content"><table id="table-sites"><thead><tr></tr></thead><tbody></tbody></table></div>
</div>

<!-- Networks -->
<div class="panel" id="panel-networks">
  <div class="toolbar">
    <input type="text" id="searchNetworks" placeholder="Search networks..." oninput="filterTable('networks')">
    <div class="stats" id="stats-networks"></div>
  </div>
  <div class="content"><table id="table-networks"><thead><tr></tr></thead><tbody></tbody></table></div>
</div>

<script>
const OUI_MAP = {
  '3ce072': { vendor: 'Apple', hostnames: ['IPHONE', 'IPAD'], type: 'Mobile/Tablet' },
  'a483e7': { vendor: 'Apple', hostnames: ['MACBOOK'], type: 'Laptop' },
  '8425db': { vendor: 'Samsung', hostnames: ['GALAXY'], type: 'Phone' },
  'f8b156': { vendor: 'Dell', hostnames: ['LAPTOP', 'DESKTOP'], type: 'PC' },
  '10b676': { vendor: 'HP', hostnames: ['LAPTOP'], type: 'Laptop' },
  'c8b5ad': { vendor: 'HP', hostnames: ['PRINTER'], type: 'Printer' },
  '28d244': { vendor: 'Lenovo', hostnames: ['THINKPAD'], type: 'Laptop' },
  '281878': { vendor: 'Microsoft', hostnames: ['SURFACE'], type: 'Laptop/Tablet' },
  'f4f5d8': { vendor: 'Google', hostnames: ['PIXEL'], type: 'Phone' },
  '001b0d': { vendor: 'Cisco', hostnames: ['VOIP'], type: 'VoIP Phone' },
  '00a0f8': { vendor: 'Zebra', hostnames: ['SCANNER'], type: 'Scanner' },
};

let state = { org_id: '', sites: [], devices: [], wireless: [], wired: [], networks: [], siteMap: {} };

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'cls') e.className = v;
    else if (k === 'text') e.textContent = v;
    else if (k.startsWith('data_')) e.dataset[k.slice(5)] = v;
    else if (k === 'style') e.setAttribute('style', v);
    else e.setAttribute(k, v);
  });
  if (children) children.forEach(c => { if (c) e.appendChild(c); });
  return e;
}

function setStatus(text, type) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = text;
  badge.className = 'status ' + type;
}

async function apiFetch(path) {
  const base = document.getElementById('apiUrl').value.replace(/\/$/, '');
  const key = document.getElementById('apiKey').value;
  const res = await fetch(base + path, { headers: { 'Authorization': 'Token ' + key } });
  if (!res.ok) throw new Error(res.status + ' ' + res.statusText + ' for ' + path);
  return res.json();
}

function formatMac(mac) {
  if (!mac || mac.length !== 12) return mac || '';
  return mac.match(/.{2}/g).join(':');
}

function checkCoherence(mac, hostname, manufacture) {
  const oui = (mac || '').substring(0, 6).toLowerCase();
  const prefix = (hostname || '').split('-')[0];
  const info = OUI_MAP[oui];
  if (!info) return { ok: true, reason: 'Unknown OUI' };
  if (!info.hostnames.includes(prefix))
    return { ok: false, reason: prefix + ' hostname has ' + info.vendor + ' OUI (' + oui + ')' };
  if (manufacture && info.vendor !== manufacture && !(manufacture === 'HP' && info.vendor === 'HP'))
    return { ok: false, reason: 'manufacture=' + manufacture + ' but OUI=' + info.vendor };
  return { ok: true };
}

function clearChildren(parent) { while (parent.firstChild) parent.removeChild(parent.firstChild); }

function addOption(select, value, text) {
  select.appendChild(el('option', { value: value, text: text }));
}

async function loadAll() {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true;
  setStatus('Loading...', 'loading');
  try {
    const self = await apiFetch('/api/v1/self');
    state.org_id = self.privileges && self.privileges[0] ? self.privileges[0].org_id : '';
    if (!state.org_id) throw new Error('No org_id in /self');

    const [sites, devices, orgNets] = await Promise.all([
      apiFetch('/api/v1/orgs/' + state.org_id + '/sites?limit=100'),
      apiFetch('/api/v1/orgs/' + state.org_id + '/stats/devices?limit=1000'),
      apiFetch('/api/v1/orgs/' + state.org_id + '/networks?limit=100'),
    ]);
    state.sites = sites; state.devices = devices; state.networks = orgNets;
    state.siteMap = {};
    sites.forEach(function(s) { state.siteMap[s.id] = s.name; });

    state.wireless = []; state.wired = [];
    await Promise.all(sites.map(async function(site) {
      const [wl, wd] = await Promise.all([
        apiFetch('/api/v1/sites/' + site.id + '/stats/clients?limit=1000'),
        apiFetch('/api/v1/sites/' + site.id + '/wired_clients/search?limit=1000'),
      ]);
      wl.forEach(function(c) { c._site_name = site.name; c._site_id = site.id; });
      (wd.results || []).forEach(function(c) { c._site_name = site.name; c._site_id = site.id; });
      state.wireless.push.apply(state.wireless, wl);
      state.wired.push.apply(state.wired, wd.results || []);
    }));

    document.getElementById('count-devices').textContent = state.devices.length;
    document.getElementById('count-wireless').textContent = state.wireless.length;
    document.getElementById('count-wired').textContent = state.wired.length;
    document.getElementById('count-sites').textContent = state.sites.length;
    document.getElementById('count-networks').textContent = state.networks.length;

    populateFilters();
    renderOverview();
    renderDevices();
    renderWireless();
    renderWired();
    renderSites();
    renderNetworks();

    setStatus('Loaded \u2014 ' + state.devices.length + ' devices, ' + (state.wireless.length + state.wired.length) + ' clients', 'ok');
  } catch(e) {
    setStatus(e.message, 'err');
  }
  btn.disabled = false;
}

function populateFilters() {
  ['filterDeviceSite','filterWirelessSite','filterWiredSite'].forEach(function(id) {
    var s = document.getElementById(id);
    clearChildren(s);
    addOption(s, '', 'All Sites');
    state.sites.forEach(function(site) { addOption(s, site.id, site.name); });
  });
  var wlVendors = []; state.wireless.forEach(function(c) { if (wlVendors.indexOf(c.manufacture) === -1) wlVendors.push(c.manufacture); });
  wlVendors.sort();
  var wlSel = document.getElementById('filterWirelessVendor');
  clearChildren(wlSel); addOption(wlSel, '', 'All Vendors');
  wlVendors.forEach(function(v) { addOption(wlSel, v, v); });

  var wrVendors = []; state.wired.forEach(function(c) {
    var oui = (c.mac||'').substring(0,6);
    var v = OUI_MAP[oui] ? OUI_MAP[oui].vendor : 'Unknown';
    if (wrVendors.indexOf(v) === -1) wrVendors.push(v);
  });
  wrVendors.sort();
  var wrSel = document.getElementById('filterWiredVendor');
  clearChildren(wrSel); addOption(wrSel, '', 'All Vendors');
  wrVendors.forEach(function(v) { addOption(wrSel, v, v); });
}

function makeHeaderRow(cols) {
  var tr = el('tr');
  cols.forEach(function(c) { tr.appendChild(el('th', { text: c })); });
  return tr;
}

function renderOverview() {
  var cards = document.getElementById('summaryCards');
  clearChildren(cards);
  var aps = state.devices.filter(function(d){return d.type==='ap'}).length;
  var sw = state.devices.filter(function(d){return d.type==='switch'}).length;
  var gw = state.devices.filter(function(d){return d.type==='gateway'}).length;

  var badW = 0, badR = 0;
  state.wireless.forEach(function(c) { if (!checkCoherence(c.mac, c.hostname, c.manufacture).ok) badW++; });
  state.wired.forEach(function(c) { if (!checkCoherence(c.mac, c.hostname).ok) badR++; });
  var totalBad = badW + badR;
  var totalClients = state.wireless.length + state.wired.length;

  var phonesInWired = state.wired.filter(function(c) {
    var oui = (c.mac||'').substring(0,6);
    return ['3ce072','8425db','f4f5d8'].indexOf(oui) !== -1;
  }).length;
  var desktopsInWireless = state.wireless.filter(function(c) { return (c.hostname||'').indexOf('DESKTOP-') === 0; }).length;

  function addCard(label, value, sub, color) {
    var card = el('div', {cls:'card'}, [
      el('div', {cls:'label', text:label}),
      el('div', {cls:'value', style: color ? 'color:'+color : '', text: String(value)}),
    ]);
    if (sub) card.appendChild(el('div', {cls:'sub', text:sub}));
    cards.appendChild(card);
  }
  addCard('Sites', state.sites.length);
  addCard('Devices', state.devices.length, aps+' APs, '+sw+' switches, '+gw+' gateways');
  addCard('Wireless Clients', state.wireless.length);
  addCard('Wired Clients', state.wired.length);
  addCard('Networks', state.networks.length);
  addCard('MAC/Hostname Coherence', totalBad === 0 ? 'PASS' : totalBad + ' ISSUES',
    totalClients + ' clients checked', totalBad === 0 ? 'var(--green)' : 'var(--red)');

  var vr = document.getElementById('validationResults');
  clearChildren(vr);
  vr.appendChild(el('h3', {style:'padding:12px 0;color:var(--text-dim);font-size:13px', text:'Coherence Validation'}));

  var tbl = el('table');
  var thead = el('thead', null, [makeHeaderRow(['Check','Result','Details'])]);
  tbl.appendChild(thead);
  var tbody = el('tbody');

  function addCheck(check, ok, tagClass, tagText, details) {
    var tr = el('tr', null, [
      el('td', {text: check}),
      el('td', null, [el('span', {cls:'tag '+tagClass, text:tagText})]),
      el('td', {text: details}),
    ]);
    tbody.appendChild(tr);
  }

  addCheck('MAC/Hostname match',
    totalBad===0, totalBad===0?'tag-ok':'tag-err', totalBad===0?'ALL OK':totalBad+' mismatches',
    totalClients + ' clients \u2014 every hostname prefix matches its OUI vendor');
  addCheck('No phones in wired pool',
    phonesInWired===0, phonesInWired===0?'tag-ok':'tag-warn', phonesInWired===0?'OK':phonesInWired+' found',
    'iPhones, Galaxys, Pixels should not appear as wired clients');
  addCheck('No desktops in wireless pool',
    desktopsInWireless===0, desktopsInWireless===0?'tag-ok':'tag-warn', desktopsInWireless===0?'OK':desktopsInWireless+' found',
    'Desktops should be wired, not wireless');

  // OUI distribution
  var ouiCounts = {};
  state.wireless.concat(state.wired).forEach(function(c) {
    var oui = (c.mac||'').substring(0,6);
    var info = OUI_MAP[oui];
    var label = info ? info.vendor + ' (' + info.type + ')' : 'Unknown (' + oui + ')';
    ouiCounts[label] = (ouiCounts[label]||0) + 1;
  });
  var distText = Object.entries(ouiCounts).sort(function(a,b){return b[1]-a[1]}).map(function(e){return e[0]+': '+e[1]}).join('  |  ');
  addCheck('OUI distribution', true, 'tag-ok', 'INFO', distText);

  tbl.appendChild(tbody);
  vr.appendChild(tbl);
}

function renderDevices() {
  var thead = document.querySelector('#table-devices thead');
  clearChildren(thead);
  thead.appendChild(makeHeaderRow(['Name','Type','Model','MAC','IP','Status','Site','Serial','Version']));
  var tbody = document.querySelector('#table-devices tbody');
  clearChildren(tbody);
  state.devices.forEach(function(d) {
    var siteName = state.siteMap[d.site_id] || d.site_id;
    var typeClass = d.type==='ap'?'tag-ap':d.type==='switch'?'tag-switch':'tag-gateway';
    var statusClass = d.status==='connected'?'tag-ok':'tag-err';
    var tr = el('tr', {
      data_search: (d.name+d.mac+d.model+d.ip+siteName).toLowerCase(),
      data_type: d.type, data_site: d.site_id
    }, [
      el('td', null, [el('strong', {text: d.name||''})]),
      el('td', null, [el('span', {cls:'tag '+typeClass, text:d.type})]),
      el('td', {text: d.model||''}),
      el('td', {cls:'mac', text: formatMac(d.mac)}),
      el('td', {cls:'ip', text: d.ip||''}),
      el('td', null, [el('span', {cls:'tag '+statusClass, text:d.status||''})]),
      el('td', {text: siteName}),
      el('td', {cls:'dim', text: d.serial||''}),
      el('td', {cls:'dim', text: d.version||''}),
    ]);
    tbody.appendChild(tr);
  });
}

function renderWireless() {
  var thead = document.querySelector('#table-wireless thead');
  clearChildren(thead);
  thead.appendChild(makeHeaderRow(['Hostname','Vendor','MAC (OUI)','IP','OS','Family','Model','SSID','Band','Site','Coherence']));
  var tbody = document.querySelector('#table-wireless tbody');
  clearChildren(tbody);
  state.wireless.forEach(function(c) {
    var chk = checkCoherence(c.mac, c.hostname, c.manufacture);
    var oui = (c.mac||'').substring(0,6);
    var macTd = el('td', {cls:'mac'});
    macTd.appendChild(document.createTextNode(formatMac(c.mac) + ' '));
    macTd.appendChild(el('span', {cls:'dim', text:'('+oui+')'}));
    var tr = el('tr', {
      data_search: (c.hostname+c.manufacture+c.mac+c.ip+c.os+c.model+(c._site_name||'')).toLowerCase(),
      data_vendor: c.manufacture, data_site: c._site_id||'', data_bad: String(!chk.ok)
    }, [
      el('td', null, [el('strong', {text: c.hostname||''})]),
      el('td', {text: c.manufacture||''}),
      macTd,
      el('td', {cls:'ip', text: c.ip||''}),
      el('td', {text: c.os||''}),
      el('td', {text: c.family||''}),
      el('td', {text: c.model||''}),
      el('td', {text: c.ssid||''}),
      el('td', {text: c.band||''}),
      el('td', {text: c._site_name||''}),
      el('td', {cls: chk.ok?'coherence-ok':'coherence-bad', text: chk.ok?'OK':chk.reason}),
    ]);
    tbody.appendChild(tr);
  });
}

function renderWired() {
  var thead = document.querySelector('#table-wired thead');
  clearChildren(thead);
  thead.appendChild(makeHeaderRow(['Hostname','Vendor (OUI)','MAC','IP','VLAN','Port','Switch MAC','Auth','Site','Coherence']));
  var tbody = document.querySelector('#table-wired tbody');
  clearChildren(tbody);
  state.wired.forEach(function(c) {
    var oui = (c.mac||'').substring(0,6);
    var vendor = OUI_MAP[oui] ? OUI_MAP[oui].vendor : 'Unknown';
    var chk = checkCoherence(c.mac, c.hostname);
    var ip = Array.isArray(c.ip) ? c.ip[0] : c.ip;
    var vlan = Array.isArray(c.vlan) ? c.vlan[0] : c.vlan;
    var port = Array.isArray(c.port_id) ? c.port_id[0] : c.port_id;
    var devMac = Array.isArray(c.device_mac) ? c.device_mac[0] : c.device_mac;
    var vendorTd = el('td');
    vendorTd.appendChild(document.createTextNode(vendor + ' '));
    vendorTd.appendChild(el('span', {cls:'dim', text:'('+oui+')'}));
    var tr = el('tr', {
      data_search: (c.hostname+vendor+c.mac+ip+(c._site_name||'')).toLowerCase(),
      data_vendor: vendor, data_site: c._site_id||'', data_bad: String(!chk.ok)
    }, [
      el('td', null, [el('strong', {text: c.hostname||''})]),
      vendorTd,
      el('td', {cls:'mac', text: formatMac(c.mac)}),
      el('td', {cls:'ip', text: ip||''}),
      el('td', {text: String(vlan||'')}),
      el('td', {cls:'dim', text: port||''}),
      el('td', {cls:'mac', text: formatMac(devMac)}),
      el('td', {text: c.auth_method||''}),
      el('td', {text: c._site_name||''}),
      el('td', {cls: chk.ok?'coherence-ok':'coherence-bad', text: chk.ok?'OK':chk.reason}),
    ]);
    tbody.appendChild(tr);
  });
}

function renderSites() {
  var thead = document.querySelector('#table-sites thead');
  clearChildren(thead);
  thead.appendChild(makeHeaderRow(['Name','Address','Country','Timezone','Lat','Lng','ID']));
  var tbody = document.querySelector('#table-sites tbody');
  clearChildren(tbody);
  state.sites.forEach(function(s) {
    var tr = el('tr', {data_search: (s.name+s.address+s.country_code+s.id).toLowerCase()}, [
      el('td', null, [el('strong', {text: s.name||''})]),
      el('td', {text: s.address||''}),
      el('td', {text: s.country_code||''}),
      el('td', {cls:'dim', text: s.timezone||''}),
      el('td', {cls:'ip', text: String(s.latlng?s.latlng.lat:'')}),
      el('td', {cls:'ip', text: String(s.latlng?s.latlng.lng:'')}),
      el('td', {cls:'dim', style:'font-size:11px', text: s.id}),
    ]);
    tbody.appendChild(tr);
  });
}

function renderNetworks() {
  var thead = document.querySelector('#table-networks thead');
  clearChildren(thead);
  thead.appendChild(makeHeaderRow(['Name','Subnet','VLAN ID','Gateway','Internet','ID']));
  var tbody = document.querySelector('#table-networks tbody');
  clearChildren(tbody);
  state.networks.forEach(function(n) {
    var tr = el('tr', {data_search: (n.name+n.subnet+n.vlan_id+n.id).toLowerCase()}, [
      el('td', null, [el('strong', {text: n.name||''})]),
      el('td', {cls:'ip', text: n.subnet||''}),
      el('td', {text: String(n.vlan_id||'')}),
      el('td', {cls:'ip', text: n.gateway||''}),
      el('td', {text: n.internet_access && n.internet_access.enabled ? 'Yes' : 'No'}),
      el('td', {cls:'dim', style:'font-size:11px', text: n.id}),
    ]);
    tbody.appendChild(tr);
  });
}

function filterTable(panel) {
  var search, rows, typeFilter, siteFilter, vendorFilter, showBad;
  if (panel === 'devices') {
    search = document.getElementById('searchDevices').value.toLowerCase();
    typeFilter = document.getElementById('filterDeviceType').value;
    siteFilter = document.getElementById('filterDeviceSite').value;
    rows = document.querySelectorAll('#table-devices tbody tr');
  } else if (panel === 'wireless') {
    search = document.getElementById('searchWireless').value.toLowerCase();
    vendorFilter = document.getElementById('filterWirelessVendor').value;
    siteFilter = document.getElementById('filterWirelessSite').value;
    showBad = document.getElementById('showOnlyBad').checked;
    rows = document.querySelectorAll('#table-wireless tbody tr');
  } else if (panel === 'wired') {
    search = document.getElementById('searchWired').value.toLowerCase();
    vendorFilter = document.getElementById('filterWiredVendor').value;
    siteFilter = document.getElementById('filterWiredSite').value;
    rows = document.querySelectorAll('#table-wired tbody tr');
  } else if (panel === 'sites') {
    search = document.getElementById('searchSites').value.toLowerCase();
    rows = document.querySelectorAll('#table-sites tbody tr');
  } else if (panel === 'networks') {
    search = document.getElementById('searchNetworks').value.toLowerCase();
    rows = document.querySelectorAll('#table-networks tbody tr');
  }
  var visible = 0;
  rows.forEach(function(row) {
    var show = true;
    if (search && row.dataset.search.indexOf(search) === -1) show = false;
    if (typeFilter && row.dataset.type !== typeFilter) show = false;
    if (siteFilter && row.dataset.site !== siteFilter) show = false;
    if (vendorFilter && row.dataset.vendor !== vendorFilter) show = false;
    if (showBad && row.dataset.bad !== 'true') show = false;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  var statsEl = document.getElementById('stats-' + panel);
  if (statsEl) statsEl.textContent = 'Showing ' + visible + ' of ' + rows.length;
}

// Tab switching
document.getElementById('tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  tab.classList.add('active');
  document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
});

window.addEventListener('load', function() { loadAll(); });
</script>
